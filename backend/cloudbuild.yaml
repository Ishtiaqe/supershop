steps:
  # 1. Build the backend Docker image
  - name: "gcr.io/cloud-builders/docker"
    args: [
        "build",
        "-t",
        "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID",
        "-f",
        "backend/Dockerfile",
        "./backend",
      ]

  # 2. Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"]

  # 3. Deploy the image to Cloud Run
  # No secret checks: we deliberately keep the current env vars in Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - supershop-backend
      - --image
      - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"
      - --region
      - asia-southeast1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8000"
      # Use Secret Manager references for secrets in production instead of plaintext
      # Example: --set-secrets JWT_SECRET=projects/shomaj-817b0/secrets/JWT_SECRET:latest
      # Provide secret NAMES through substitutions below, not the secret value.
      # Keep current Cloud Run env vars (do not change JWT/DATABASE env type)
      # Ensure the app listens on the expected port (Nest reads PORT from env/config)
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --quiet

  # 4. Create or replace a Cloud Run Job for migrations and run it
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: run-migrations
    entrypoint: bash
    args:
      - -c
      - |
        set -e
        # Ensure job exists (replace if exists)
        gcloud run jobs describe supershop-migrate --region=asia-southeast1 >/dev/null 2>&1 && \
          gcloud run jobs replace --region=asia-southeast1 --file=- <<JOB || true
        apiVersion: v1
        kind: Job
        metadata:
          name: supershop-migrate
        spec:
          taskTemplate:
            containers:
              - image: gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID
                command: ["bash", "-lc"]
                args:
                  - npx prisma migrate deploy
                env:
                  - name: DATABASE_URL
                    # Allow passing a validated DATABASE_URL substitution to the build.
                    # Example: --substitutions=_DATABASE_URL="postgresql://user:pass@/supershop?host=/cloudsql/PROJECT:asia-southeast1:INSTANCE"
                    # Accept a secret name reference for DATABASE_URL (recommended)
                    value: "${_DATABASE_URL}"
            timeoutSeconds: 120
        JOB
        # Create if missing
          gcloud run jobs describe supershop-migrate --region=asia-southeast1 >/dev/null 2>&1 || \
          gcloud run jobs create supershop-migrate --image gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID --region=asia-southeast1 --command "bash" --args "-c","npx prisma migrate deploy" --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
  # Execute migration job (blocking) - done as a follow-up Cloud Build step
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - supershop-migrate
      - --region
      - asia-southeast1
      - --wait

images:
  # Use BUILD_ID here to avoid an empty tag when running locally. When you configure
  # a trigger that provides SHORT_SHA, you can change these lines to use $SHORT_SHA.
  - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"

substitutions:
  _REGION: "asia-southeast1"
  _DATABASE_URL: "postgresql://supershop_user:MUJAHIDrumel123@/supershop?host=/cloudsql/shomaj-817b0:asia-southeast1:supershop"
  _JWT_SECRET: "default_jwt_secret_for_build"
  _JWT_REFRESH_SECRET: "default_refresh_secret_for_build"
  # Expect this to be set either as a full Cloud SQL instance id (PROJECT:asia-southeast1:INSTANCE)
  # or a short instance name depending on your CI; default is set below in docs.
  _CLOUDSQL_INSTANCE: "shomaj-817b0:asia-southeast1:supershop"
  # Secret manager names for runtime environment variables. Create these secrets in
  # Secret Manager and give Cloud Run the Secret Manager accessor role for each
  # secret (roles/secretmanager.secretAccessor) on the Cloud Run runtime service account.
  _JWT_SECRET_SECRET: "JWT_SECRET"
  _JWT_REFRESH_SECRET_SECRET: "JWT_REFRESH_SECRET"
  _DATABASE_URL_SECRET: "DATABASE_URL"

timeout: "1200s"

options:
  substitutionOption: "ALLOW_LOOSE"
