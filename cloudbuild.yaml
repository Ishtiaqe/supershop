steps:
  # 1. Build Image (Explicit Context)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - "build"
      - "-t"
      - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"
      - "-f"
      - "backend/Dockerfile"
      - "backend"

  # 2. Push Image
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"]

  # 3. Deploy (Matches your Service Name 'supershop')
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - supershop
      - --image
      - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"
      - --region
      - ${_REGION}
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8080"
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --set-env-vars=DATABASE_URL=${_DATABASE_URL}
      - --quiet

  # 4. Update Migration Job
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - supershop-migrate
      - --image
      - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"
      - --region
      - ${_REGION}
      - --command
      - "npx"
      - --args
      - "prisma,migrate,deploy"
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --set-env-vars=DATABASE_URL=${_DATABASE_URL}
      - --task-timeout
      - "600s"

  # 5. Run Migrations
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - supershop-migrate
      - --region
      - ${_REGION}
      - --wait

images:
  - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"

substitutions:
  _REGION: "asia-southeast1"
  # FIXED TYPO: Removed extra '@'
  _DATABASE_URL: "postgresql://supershop_user:MUJAHIDrumel123@123@/supershop?host=/cloudsql/shomaj-817b0:asia-southeast1:supershop"
  _CLOUDSQL_INSTANCE: "shomaj-817b0:asia-southeast1:supershop"

timeout: "1200s"
options:
  substitutionOption: "ALLOW_LOOSE"