steps:
  # 1. Build the backend Docker image (FIXED)
  - name: "gcr.io/cloud-builders/docker"
    dir: "backend"
    args:
      - "build"
      - "-t"
      - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"
      - "."

  # 2. Push the image to Container Registry
  - name: "gcr.io/cloud-builders/docker"
    dir: "backend"
    args: ["push", "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"]

  # 3. Deploy the image to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    dir: "backend"
    entrypoint: gcloud
    args:
      - run
      - deploy
      - supershop-backend
      - --image
      - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"
      - --region
      - asia-southeast1
      - --platform
      - managed
      - --allow-unauthenticated
      - --port
      - "8000"
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      # Pass the plain text DB URL as an environment variable (per your request)
      - --set-env-vars=DATABASE_URL=${_DATABASE_URL}
      - --quiet

  # 4. Create or Update Migration Job (FIXED & SIMPLIFIED)
  # Using 'jobs update' is safer and cleaner than the complex bash script.
  # It creates the job if missing, or updates it if it exists.
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - jobs
      - update
      - supershop-migrate
      - --image
      - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"
      - --region
      - asia-southeast1
      - --command
      - "npx"
      - --args
      - "prisma,migrate,deploy"
      - --add-cloudsql-instances=${_CLOUDSQL_INSTANCE}
      - --set-env-vars=DATABASE_URL=${_DATABASE_URL}
      - --task-timeout
      - "600s"

  # 5. Run the migration job
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - supershop-migrate
      - --region
      - asia-southeast1
      - --wait

images:
  - "gcr.io/shomaj-817b0/supershop-backend:$BUILD_ID"

substitutions:
  _REGION: "asia-southeast1"
  # Note: Hardcoding passwords here is insecure but functions for now as requested.
  _DATABASE_URL: "postgresql://supershop_user:MUJAHIDrumel123@@/supershop?host=/cloudsql/shomaj-817b0:asia-southeast1:supershop"
  _CLOUDSQL_INSTANCE: "shomaj-817b0:asia-southeast1:supershop"

timeout: "1200s"
options:
  substitutionOption: "ALLOW_LOOSE"