<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline - SuperShop</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd/dist/antd.min.css" />
  <style>
    body { background: #f9fafb; color: #111827; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .container { min-height: 100vh; display: flex; align-items: center; justify-content: center; flex-direction: column; padding: 2rem; }
    .title { font-size: 2rem; margin-bottom: 0.5rem; }
    .subtitle { color: #6b7280; margin-bottom: 1.5rem; }
    .btn { background: #1677ff; color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 0.375rem; cursor: pointer; font-size: 1rem; }
    .btn:hover { background: #1158c7; }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">You are offline</div>
    <div class="subtitle">Please check your internet connection. Some features may be unavailable, but you can still access cached data.</div>
    <a href="/dashboard"><button class="btn">Go to Dashboard</button></a>
  </div>
</body>
</html>
